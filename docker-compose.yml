services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: service-desk-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-service_desk_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - service-desk-network

  # Redis Queue & Cache
  redis:
    image: redis:7-alpine
    container_name: service-desk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - service-desk-network

  # Ingestion Service (Port 8000)
  ingestion-service:
    build:
      context: .
      dockerfile: ingestion_service/Dockerfile
    container_name: service-desk-ingestion
    environment:
      - INGESTION_HOST=0.0.0.0
      - INGESTION_PORT=8000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-service_desk_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CONFIG_SERVICE_URL=http://config-service:8002
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      config-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - service-desk-network

  # ML Service (Port 8001)
  ml-service:
    build:
      context: .
      dockerfile: ml_service/Dockerfile
    container_name: service-desk-ml
    environment:
      - ML_SERVICE_HOST=0.0.0.0
      - ML_SERVICE_PORT=8001
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-service_desk_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CONFIG_SERVICE_URL=http://config-service:8002
      - OUTPUT_SERVICE_URL=http://output-service:8003
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # API настройки
      - API_RELOAD=${API_RELOAD:-false}
      # Worker для автоматической обработки очереди
      # ВАЖНО: Для production режима должен быть включен (true)
      # Worker обрабатывает тикеты из очереди Redis и классифицирует их
      - WORKER_ENABLED=${WORKER_ENABLED:-true}
      - WORKER_QUEUE_TIMEOUT=${WORKER_QUEUE_TIMEOUT:-5}
      - WORKER_DELAY=${WORKER_DELAY:-0.1}
      # Версия модели (по умолчанию v1.0)
      # ПРИМЕЧАНИЕ: ML Service автоматически получает версию из Config Service при старте
      # Эта переменная используется только как fallback, если Config Service недоступен
      # Актуальная версия хранится в таблице configuration (ключ: current_model_version)
      # В БД должна быть только одна версия v1.0 на основе classifier_smote_new.pkl
      - ML_MODEL_VERSION=${ML_MODEL_VERSION:-v1.0}
      # Имена файлов модели (используется classifier_smote_new.pkl)
      # Пути к файлам определяются из таблицы model_versions в БД
      - ML_CLASSIFIER_FILE=${ML_CLASSIFIER_FILE:-classifier_smote_new.pkl}
      - ML_VECTORIZER_FILE=${ML_VECTORIZER_FILE:-vectorizer_smote.pkl}
      - ML_LABEL_ENCODER_FILE=${ML_LABEL_ENCODER_FILE:-label_encoder_smote.pkl}
    ports:
      - "8001:8001"
    volumes:
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      config-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - service-desk-network

  # Config Service (Port 8002)
  config-service:
    build:
      context: .
      dockerfile: config_service/Dockerfile
    container_name: service-desk-config
    environment:
      - CONFIG_HOST=0.0.0.0
      - CONFIG_PORT=8002
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-service_desk_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - service-desk-network

  # Output Service (Port 8003)
  output-service:
    build:
      context: .
      dockerfile: output_service/Dockerfile
    container_name: service-desk-output
    environment:
      - OUTPUT_HOST=0.0.0.0
      - OUTPUT_PORT=8003
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-service_desk_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      # Config Service для получения конфигурации
      - CONFIG_SERVICE_URL=http://config-service:8002
      - CONFIG_SERVICE_TIMEOUT=${CONFIG_SERVICE_TIMEOUT:-2.0}
      # Destination configuration: filesystem | mock | jira
      # Use 'filesystem' or 'mock' to work without Jira integration
      - DESTINATION_TYPE=${DESTINATION_TYPE:-filesystem}
      - OUTPUT_DIR=${OUTPUT_DIR:-/app/output}
      # Jira configuration (optional, only needed if DESTINATION_TYPE=jira)
      - JIRA_URL=${JIRA_URL:-}
      - JIRA_USER=${JIRA_USER:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - JIRA_PROJECT_KEY=${JIRA_PROJECT_KEY:-SD}
      - JIRA_ENABLED=${JIRA_ENABLED:-false}
      - JIRA_VALIDATE_CONNECTION=${JIRA_VALIDATE_CONNECTION:-false}
      - MAX_RETRY_ATTEMPTS=${MAX_RETRY_ATTEMPTS:-3}
      - RETRY_DELAY=${RETRY_DELAY:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8003:8003"
    volumes:
      # Volume for filesystem output (only used when DESTINATION_TYPE=filesystem)
      - output_data:/app/output
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - service-desk-network

  # Dashboard (Port 8501)
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: service-desk-dashboard
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-service_desk_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - INGESTION_SERVICE_URL=http://ingestion-service:8000
      - ML_SERVICE_URL=http://ml-service:8001
      - CONFIG_SERVICE_URL=http://config-service:8002
      - OUTPUT_SERVICE_URL=http://output-service:8003
      # Режим работы Dashboard:
      # - 'demo': Прямой вызов ML Service (быстро, без логирования в БД)
      # - 'production': Через Ingestion Service (полный pipeline с логированием в ticket_events)
      #   ВАЖНО: Для production режима требуется WORKER_ENABLED=true в ml-service
      - DASHBOARD_MODE=${DASHBOARD_MODE:-demo}
    ports:
      - "8501:8501"
    volumes:
      # Volume mount для разработки - изменения в коде применяются без пересборки
      - ./dashboard:/app/dashboard
      - ./shared:/app/shared
    depends_on:
      postgres:
        condition: service_healthy
      ingestion-service:
        condition: service_started
      ml-service:
        condition: service_started
      config-service:
        condition: service_started
      output-service:
        condition: service_started
    networks:
      - service-desk-network

volumes:
  postgres_data:
  redis_data:
  output_data:  # Volume for filesystem output destination

networks:
  service-desk-network:
    driver: bridge

